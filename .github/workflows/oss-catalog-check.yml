name: oss-catalog-check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/oss-catalog-check.yml"
      - "tools/oss-catalog/**"
      - "catalog/**"
      - "Makefile"
  pull_request:
    paths:
      - ".github/workflows/oss-catalog-check.yml"
      - "tools/oss-catalog/**"
      - "catalog/**"
      - "Makefile"

jobs:
  verify-oss-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: |
          python3 -m unittest discover -s tools/oss-catalog/tests -p "test_*.py"

      - name: Verify catalog artifacts are up-to-date
        run: |
          python3 tools/oss-catalog/generate_catalog.py --check
